    - system
    - context
    - owner
    - auth
    - all-agents
mode: REACT
budget:
  runTimeoutMs: 1800000
  model:
    maxCalls: 60
  tool:
    maxCalls: 30
react:
  maxSteps: 45
wonders:
  - 这个任务前后依赖很强，帮我按阶段串行调度
  - 先做第一步，拿到结果后再决定第二步交给哪个 agent
  - 帮我一步一步推进这个任务，不要并发乱开分支
