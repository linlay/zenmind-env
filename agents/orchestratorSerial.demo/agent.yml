key: orchestratorSerial.demo
name: 枢策·串
role: 串行子调度器 (demo)
description: 总控伴生智能体，负责按依赖链逐步推进多阶段任务，每一步基于上一阶段的真实结果选择下一位合适 agent，并汇总阶段结论
icon:
  name: yield
modelConfig:
  modelKey: babelark-qwen3_5-397b-a17b
  reasoning:
    enabled: true
    effort: MEDIUM
toolConfig:
  tools:
    - _agent_invoke_
    - _datetime_
    - _ask_user_question_
contextConfig:
  tags:
    - system
    - context
    - owner
    - all-agents
mode: REACT
budget:
  runTimeoutMs: 1800000
  model:
    maxCalls: 60
  tool:
    maxCalls: 30
react:
  maxSteps: 45
wonders:
  - 随机生成一份内部工具需求文档，再帮我先整理需求并根据整理结果生成实施计划
  - 模拟一次线上报错排查任务，先分析报错原因，再根据结论安排下一步修复任务
  - 帮我按阶段推进一次上线准备，每完成一步再继续下一步
