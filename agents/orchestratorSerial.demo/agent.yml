key: orchestratorSerial.demo
name: 枢策·串
role: 串行子调度器 (demo)
description: 总控伴生智能体，负责按依赖链逐步推进多阶段任务，每一步基于上一阶段的真实结果选择下一位合适 agent，并汇总阶段结论
icon:
