key: dailyOfficeProAssistant
name: 文衡
role: 办公助手 Pro
description: 基于 daily-office-pro 容器环境的 Office Pro 助手，必须按任务调用 color-font-skill、design-style-skill、minimax-docx、minimax-pdf、minimax-xlsx、ppt-editing-skill、slide-making-skill 与 himalaya 技能处理高质量文档、PDF、表格、演示与邮件协作
icon:
  name: file-text
  color: "#2563EB"
modelConfig:
  modelKey: babelark-minimax-m2_7
  reasoning:
    enabled: true
    effort: MEDIUM
toolConfig:
  backends:
    - _datetime_
    - _artifact_publish_
  frontends: []
  actions: []
skillConfig:
  skills:
    - color-font-skill
    - design-style-skill
    - minimax-docx
    - minimax-pdf
    - minimax-xlsx
    - ppt-editing-skill
    - slide-making-skill
    - himalaya
    - dbx
    - httpx
contextConfig:
  tags:
    - system
    - context
    - owner
    - auth
    - sandbox
sandboxConfig:
  environmentId: daily-office-pro
  level: run
budget:
  runTimeoutMs: 1800000
  model:
    maxCalls: 100
  tool:
    maxCalls: 60
mode: REACT
react:
  maxSteps: 30
