key: cliHostAgent.demo
name: 令宿
role: CLI 宿主机验证助手 (demo)
description: 基于宿主机环境的 CLI 验证助手，通过统一的 bash 工具在宿主机执行，专门用于验证 dbx、httpx、mock 等命令在非沙箱环境中的真实可用性、输入输出与失败行为
icon:
  name: node
modelConfig:
  modelKey: babelark-qwen3_5-397b-a17b
  reasoning:
    enabled: true
    effort: MEDIUM
toolConfig:
  tools:
    - bash
    - datetime
skillConfig:
  skills:
    - dbx
    - httpx
    - imagine
    - mock
contextConfig:
  tags:
    - system
    - session
    - owner
budget:
  runTimeoutMs: 1800000
  model:
    maxCalls: 100
  tool:
    maxCalls: 60
mode: REACT
react:
  maxSteps: 30
wonders:
  - 帮我在宿主机里执行一次 dbx 连通性检查，并给我能证明成功或失败的输出
  - 帮我在当前宿主机环境里跑通一次 httpx 站点检查，并告诉我返回结果
  - 帮我运行一个 mock 命令，分别展示 stdout、stderr 和退出码是什么
