key: cliSandboxAgent.demo
name: 令沙
role: CLI 沙箱验证助手 (demo)
description: 基于 toolbox 容器环境的 CLI 沙箱验证助手，通过统一的 bash 工具路由到 toolbox 执行，专门用于验证 dbx、httpx、mock 等命令在受限沙箱中的真实可用性、输入输出与失败行为
icon:
  name: vault
modelConfig:
  modelKey: babelark-qwen3_5-397b-a17b
  reasoning:
    enabled: true
    effort: MEDIUM
toolConfig:
  tools:
    - bash
    - datetime
skillConfig:
  skills:
    - dbx
    - httpx
    - imagine
    - mock
contextConfig:
  tags:
    - system
    - session
    - owner
runtimeConfig:
  environmentId: toolbox
  level: run
  env:
    http_proxy: "http://127.0.0.1:8001"
    HTTP_PROXY: "http://127.0.0.1:8001"
    https_proxy: "http://127.0.0.1:8001"
    HTTPS_PROXY: "http://127.0.0.1:8001"
budget:
  runTimeoutMs: 1800000
  model:
    maxCalls: 100
  tool:
    maxCalls: 60
mode: REACT
react:
  maxSteps: 30
wonders:
  - 帮我在 toolbox 沙箱里执行一次 dbx 连通性检查，并给我能证明成功或失败的输出
  - 帮我在当前环境里跑通一次 httpx 站点检查，并告诉我返回结果
  - 帮我运行一个 mock 命令，分别展示 stdout、stderr 和退出码是什么
