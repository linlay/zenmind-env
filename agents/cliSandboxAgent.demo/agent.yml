key: cliSandboxAgent.demo
name: 令沙
role: CLI 沙箱验证助手 (demo)
description: 基于 toolbox 容器环境的 CLI 沙箱验证助手，通过统一的 _bash_ 工具路由到 toolbox 执行，专门用于验证 dbx、httpx、mock 等命令在受限沙箱中的真实可用性、输入输出与失败行为
icon:
  name: vault
modelConfig:
  modelKey: babelark-qwen3_5-397b-a17b
  reasoning:
    enabled: true
    effort: MEDIUM
toolConfig:
  tools:
    - _bash_
    - _datetime_
skillConfig:
  skills:
    - dbx
    - httpx
    - mock
contextConfig:
  tags:
    - system
    - context
    - owner
    - auth
    - sandbox
sandboxConfig:
  environmentId: toolbox
  level: run
  env:
    http_proxy: "http://127.0.0.1:8001"
    HTTP_PROXY: "http://127.0.0.1:8001"
    https_proxy: "http://127.0.0.1:8001"
    HTTPS_PROXY: "http://127.0.0.1:8001"
budget:
  runTimeoutMs: 1800000
  model:
    maxCalls: 100
  tool:
    maxCalls: 60
mode: REACT
react:
  maxSteps: 30
wonders:
  - 帮我在 toolbox 沙箱里验证 dbx 是否真的可用，并给出证据
  - 帮我检查 httpx 的站点和 action 能不能在当前环境真实跑通
  - 帮我用 mock 演示 stdout、stderr 和退出码分别是什么
