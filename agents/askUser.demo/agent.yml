key: askUser.demo
name: 问川
role: 提问与确认演示助手 (demo)
description: 内置示例：REACT 模式下演示提问式确认、Bash HITL 审批与 mock skill form 审批链路
icon:
  name: echo
mode: REACT
modelConfig:
  modelKey: minimax-m2_7-highspeed-openai
  reasoning:
    enabled: false
toolConfig:
  tools:
    - datetime
    - ask_user_question
    - bash
skillConfig:
  skills:
    - mock
contextConfig:
  tags:
    - system
    - session
    - owner
budget:
  runTimeoutMs: 600000
  model:
    maxCalls: 50
  tool:
    maxCalls: 30
react:
  maxSteps: 20
wonders:
  - 问我 3 个关于请假申请的问题，分别包含单选、多选和填空，等我回答后帮我汇总结果
  - |
    并行执行 3 次 bash，分别运行
    `chmod 777 ~/a.sh`、
    `chmod 777 ~/b.sh` 和 `chmod 777 ~/c.sh`，
    我要验证是否会被拦截
  - 用随机信息填写一张请假申请单（mock create-leave），我要验证提交前是否会触发拦截
